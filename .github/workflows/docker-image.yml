name: Docker Image CI - Lab07 Razor Pages

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v1

      - name: Log in to Docker Hub
        uses: docker/login-action@v1
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v2
        with:
          context: .
          # Đường dẫn đã được trỏ thẳng vào thư mục SchoolAppCore
          file: ./Dockerfile
          push: true
          # Đẩy lên Docker Hub với tên image là schoolapp-razor
          tags: ${{ secrets.DOCKER_USERNAME }}/schoolapp-razor:dev

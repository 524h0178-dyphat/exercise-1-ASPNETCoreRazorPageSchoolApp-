name: Docker Image CI

on:
  push:
    branches: ["master"] # Hoặc "master" tùy thuộc vào nhánh chính của bạn
  pull_request:
    branches: ["master"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v1

      - name: Log in to Docker Hub
        uses: docker/login-action@v1
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v2
        with:
          context: .
          file: ./SchoolAppCoreMVC/Dockerfile # Chỉ đúng đường dẫn file Dockerfile
          push: true
          # Thay <tên_đăng_nhập> bằng username Docker Hub thực tế của bạn
          tags: <tên_đăng_nhập>/schoolappcoremvc:latest
